name: Update Board READMEs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "boards/**"
      - "libs/**"
      - "scripts/validate_board.py"
      - "scripts/ci/update-board-readmes.py"
      - "scripts/ci/generate-board-images.sh"

permissions:
  contents: write

env:
  KICAD_IMAGE: "kicad/kicad:10.0@sha256:feb600e931ca7ad8ae684566131edbea32218cb90ab54bb2ea0944cee257eea6"

jobs:
  generate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache 3D models
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: .cache/3dmodels
          key: kicad-3dmodels-${{ hashFiles('boards/**/*.kicad_pcb') }}
          restore-keys: kicad-3dmodels-

      - name: Fetch needed 3D models
        run: bash scripts/ci/fetch-3d-models.sh .cache/3dmodels

      - name: Generate board images
        run: |
          for d in boards/*/; do
            board=$(basename "$d")
            test -f "$d/$board.kicad_pcb" || continue
            echo "========== images: $board =========="
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -e HOME=/workspace/.kicad-ci-home \
              -e KICAD10_3DMODEL_DIR=/workspace/.cache/3dmodels \
              -v "$GITHUB_WORKSPACE:/workspace" \
              -w /workspace \
              "$KICAD_IMAGE" \
              bash -c "
                source /workspace/scripts/ci/setup-kicad-env.sh
                bash /workspace/scripts/ci/generate-board-images.sh boards/$board
              "
          done

      - name: Upload generated images
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: board-images
          path: boards/*/docs/

  update-readmes:
    needs: generate-images
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download generated images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: board-images
          path: boards/

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate README sections
        run: python scripts/ci/update-board-readmes.py

      - name: Commit if changed
        run: |
          git add boards/*/docs/ boards/*/README.md
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: auto-update board images and validation summaries"
          git push
