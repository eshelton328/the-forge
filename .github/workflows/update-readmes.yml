name: Update Board READMEs

on:
  push:
    branches: [main]
    paths:
      - "boards/**"
      - "scripts/validate_board.py"
      - "scripts/ci/update-board-readmes.py"

permissions:
  contents: write

jobs:
  update-readmes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate validation summaries
        run: python scripts/ci/update-board-readmes.py

      - name: Commit if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add boards/*/README.md
          git commit -m "docs: auto-update board validation summaries"
          git push
