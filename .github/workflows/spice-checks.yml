name: SPICE simulation

# Board-targeted ngspice runs (opt-in via boards/<name>/sim.yml) plus optional fixture smoke.
# Unified toolchain: sim/docker/Dockerfile (KiCad digest + pinned ngspice + Python venv) — #62.
# Path rules live in .github/scripts/detect-spice-boards.sh.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: spice-${{ github.head_ref }}
  cancel-in-progress: true

env:
  KICAD_IMAGE: "kicad/kicad:10.0@sha256:feb600e931ca7ad8ae684566131edbea32218cb90ab54bb2ea0944cee257eea6"
  # Built from sim/docker/Dockerfile; reports use SIM_KICAD_DOCKER_IMAGE for toolchain line.
  SIM_DOCKER_IMAGE: the-forge-sim:ci

jobs:
  detect-spice:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      boards: ${{ steps.detect.outputs.boards }}
      run_fixture: ${{ steps.detect.outputs.run_fixture }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect SPICE scope
        id: detect
        env:
          BASE_REF: ${{ github.base_ref }}
        run: bash .github/scripts/detect-spice-boards.sh

      - name: Report detection
        env:
          BOARDS: ${{ steps.detect.outputs.boards }}
          RUN_FIXTURE: ${{ steps.detect.outputs.run_fixture }}
        run: |
          echo "boards=$BOARDS"
          echo "run_fixture=$RUN_FIXTURE"

  spice-fixture:
    needs: detect-spice
    if: needs.detect-spice.outputs.run_fixture == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build unified sim image
        run: docker build -t "$SIM_DOCKER_IMAGE" -f sim/docker/Dockerfile .

      - name: Run RC divider fixture
        env:
          SIM_KICAD_DOCKER_IMAGE: ${{ env.SIM_DOCKER_IMAGE }}
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/workspace/.kicad-ci-home \
            -e SIM_KICAD_DOCKER_IMAGE \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "$SIM_DOCKER_IMAGE" \
            python3 /workspace/scripts/sim/run_sim.py \
              --config sim/fixtures/rc_divider/sim.yml \
              --report sim/fixtures/rc_divider/spice-report.md

      - name: Upload fixture report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: spice-fixture-report
          path: |
            sim/fixtures/rc_divider/spice-report.md
            sim/fixtures/rc_divider/spice-report.metrics.json

  spice-board:
    needs: detect-spice
    if: needs.detect-spice.outputs.boards != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BOARDS_JSON: ${{ needs.detect-spice.outputs.boards }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build unified sim image
        run: docker build -t "$SIM_DOCKER_IMAGE" -f sim/docker/Dockerfile .

      - name: Run board SPICE (KiCad export + ngspice in container)
        env:
          SIM_KICAD_DOCKER_IMAGE: ${{ env.SIM_DOCKER_IMAGE }}
        run: bash scripts/ci/run-spice-boards-docker.sh

      - name: Stage plot PNGs for artifact
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p spice-plots-staging
          for b in $(echo "$BOARDS_JSON" | jq -r '.[]'); do
            shopt -s nullglob
            files=(boards/"$b"/sim/plots/*.png)
            if [ ${#files[@]} -gt 0 ]; then
              mkdir -p "spice-plots-staging/$b"
              cp "${files[@]}" "spice-plots-staging/$b/"
            fi
          done

      - name: Upload board SPICE plot PNGs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: spice-plots
          path: spice-plots-staging/**/*
          if-no-files-found: ignore

      - name: Stage board SPICE outputs
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p spice-board-staging
          for b in $(echo "$BOARDS_JSON" | jq -r '.[]'); do
            mkdir -p "spice-board-staging/$b"
            for f in docs/spice-report.md docs/spice-report.metrics.json sim/assembled.cir sim/kicad_export.cir; do
              p="boards/$b/$f"
              if [[ -f "$p" ]]; then
                cp "$p" "spice-board-staging/$b/"
              fi
            done
          done

      - name: Upload board SPICE artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: spice-boards
          path: spice-board-staging/**/*
          if-no-files-found: ignore

  spice-pr-comment:
    name: Post SPICE summary on PR
    if: always() && !cancelled()
    needs: [detect-spice, spice-board, spice-fixture]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Prepare artifact directories
        run: mkdir -p spice-ci-artifacts/boards spice-ci-artifacts/fixture

      - name: Download board SPICE artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: spice-boards
          path: spice-ci-artifacts/boards

      - name: Download fixture SPICE artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          name: spice-fixture-report
          path: spice-ci-artifacts/fixture

      - name: Compose SPICE PR comment
        if: always()
        env:
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SPICE_BOARD_RESULT: ${{ needs.spice-board.result }}
          SPICE_FIXTURE_RESULT: ${{ needs.spice-fixture.result }}
          SPICE_DETECT_BOARDS: ${{ needs.detect-spice.outputs.boards }}
          SPICE_RUN_FIXTURE: ${{ needs.detect-spice.outputs.run_fixture }}
        run: bash scripts/ci/compose-spice-report-comment.sh spice-ci-artifacts | tee spice-pr-comment.md

      - name: Post sticky SPICE comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2.9.1
        with:
          header: spice-simulation
          path: spice-pr-comment.md
