name: Generate Fab Files

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to generate files for'
        required: true
        default: 's3-dev-board'

jobs:
  fab-files:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - s3-dev-board
    steps:
      - uses: actions/checkout@v4

      - name: Generate JLCPCB outputs
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: kibot/jlcpcb.kibot.yaml
          board: boards/${{ matrix.board }}/${{ matrix.board }}.kicad_pcb
          schema: boards/${{ matrix.board }}/${{ matrix.board }}.kicad_sch
          dir: boards/${{ matrix.board }}
          targets: jlcpcb

      - name: Generate PCBWay outputs
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: kibot/pcbway.kibot.yaml
          board: boards/${{ matrix.board }}/${{ matrix.board }}.kicad_pcb
          schema: boards/${{ matrix.board }}/${{ matrix.board }}.kicad_sch
          dir: boards/${{ matrix.board }}
          targets: pcbway

      - name: Generate documentation
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: kibot/docs.kibot.yaml
          board: boards/${{ matrix.board }}/${{ matrix.board }}.kicad_pcb
          schema: boards/${{ matrix.board }}/${{ matrix.board }}.kicad_sch
          dir: boards/${{ matrix.board }}
          targets: docs

      - name: Upload JLCPCB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jlcpcb-${{ matrix.board }}
          path: boards/${{ matrix.board }}/output/jlcpcb/

      - name: Upload PCBWay artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pcbway-${{ matrix.board }}
          path: boards/${{ matrix.board }}/output/pcbway/

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.board }}
          path: boards/${{ matrix.board }}/output/docs/

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            boards/${{ matrix.board }}/output/jlcpcb/*
            boards/${{ matrix.board }}/output/pcbway/*
            boards/${{ matrix.board }}/output/docs/*.pdf
            boards/${{ matrix.board }}/output/docs/*.png
