name: Generate Fab Files

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to generate files for'
        required: true
        default: 'esp32s3-devkit'

jobs:
  resolve-boards:
    runs-on: ubuntu-latest
    outputs:
      boards: ${{ steps.resolve.outputs.boards }}
    steps:
      - name: Resolve boards to build
        id: resolve
        run: |
          set -euo pipefail
          all='["esp32s3-devkit","tps63070-breakout"]'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            board="${{ inputs.board }}"
            echo "boards=[\"${board}\"]" >> "$GITHUB_OUTPUT"
            echo "Manual run: ${board}"
          else
            echo "boards=${all}" >> "$GITHUB_OUTPUT"
            echo "Release tag: all boards"
          fi

  fab-files:
    needs: resolve-boards
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    container:
      image: ghcr.io/inti-cmnb/kicad10_auto_full:1.9.1
    strategy:
      matrix:
        board: ${{ fromJson(needs.resolve-boards.outputs.boards) }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate JLCPCB outputs
        run: |
          kibot -c kibot/jlcpcb.kibot.yaml \
            -b boards/${{ matrix.board }}/${{ matrix.board }}.kicad_pcb \
            -e boards/${{ matrix.board }}/${{ matrix.board }}.kicad_sch \
            -d boards/${{ matrix.board }} \
            jlcpcb

      - name: Generate PCBWay outputs
        run: |
          kibot -c kibot/pcbway.kibot.yaml \
            -b boards/${{ matrix.board }}/${{ matrix.board }}.kicad_pcb \
            -e boards/${{ matrix.board }}/${{ matrix.board }}.kicad_sch \
            -d boards/${{ matrix.board }} \
            pcbway

      - name: Generate documentation
        run: |
          kibot -c kibot/docs.kibot.yaml \
            -b boards/${{ matrix.board }}/${{ matrix.board }}.kicad_pcb \
            -e boards/${{ matrix.board }}/${{ matrix.board }}.kicad_sch \
            -d boards/${{ matrix.board }} \
            docs

      - name: Upload JLCPCB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jlcpcb-${{ matrix.board }}
          path: boards/${{ matrix.board }}/output/jlcpcb/

      - name: Upload PCBWay artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pcbway-${{ matrix.board }}
          path: boards/${{ matrix.board }}/output/pcbway/

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: docs-${{ matrix.board }}
          path: boards/${{ matrix.board }}/output/docs/

      - name: Commit fab outputs
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: boards/${{ matrix.board }}/output/
          commit-message: "fab: regenerate ${{ matrix.board }} outputs"
          branch: fab/${{ matrix.board }}-outputs
          title: "fab: regenerate ${{ matrix.board }} outputs"
          body: "Auto-generated fab outputs for `${{ matrix.board }}`."
          delete-branch: true

