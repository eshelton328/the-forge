# Require PR titles to follow Conventional Commits (same idea as semantic-release / Angular style).
# Examples: "feat: add USB-C ESD", "fix(s3): correct feedback divider", "ci: update workflow"
# See https://www.conventionalcommits.org/

name: PR title (Conventional Commits)

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read
  contents: read

jobs:
  conventional-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Common types; extend (e.g. perf, build) as you like
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
