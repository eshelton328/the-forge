# Opt-in SPICE for this board (mirrors checks.yml pattern). Requires sim/overlay.cir.
# Transient scenarios: #76. Secondary decks: line `.ac` (#79), |Zout| (`sim/ac_z_out.cir`), |Zin| (`sim/ac_z_in.cir`).
spec_version: 1
spice_engine: ngspice

assembly:
  main: sim/kicad_export.cir
  includes:
    - ../../libs/spice/tps63070/TPS63070_TRANS.LIB

scenarios:
  - id: vin_bias_op
    measures:
      - id: v_vin
        title: "VIN rail DC (after input distribution)"
        op_node: "/VIN_2v_to_16v"
        min: 9.99
        max: 10.01
  - id: tran_settle
    measures:
      - id: v_out_steady
        title: "Vout steady (post transient)"
        min: 3.28
        max: 3.32
      - id: v_out_min
        title: "Vout minimum over transient"
        min: 3.25
      - id: vout_ripple_pp
        title: "Output ripple peak-peak"
        max: 0.15
  - id: tran_load_step
    measures:
      - id: v_out_light_load
        title: "Vout at light load sample"
        min: 3.25
        max: 3.35
      - id: v_out_heavy_load
        title: "Vout at heavy load sample"
        min: 3.28
        max: 3.32

secondary_passes:
  - netlist_rel: sim/ac_small_signal.cir
    scenarios:
      - id: ac_small_signal
        measures:
          - id: vout_ac_vm_1k
            title: "AC |Vout| @ 1 kHz (small-signal anchor)"
            group: ac_line_response
            max: 1.0
          - id: vout_ac_vm
            title: "AC |Vout| @ 10 kHz"
            group: ac_line_response
            max: 1.0
          - id: vout_ac_vm_100k
            title: "AC |Vout| @ 100 kHz"
            group: ac_line_response
            max: 1.0

  - netlist_rel: sim/ac_z_out.cir
    scenarios:
      - id: ac_z_out
        measures:
          - id: z_out_1k
            title: "|Zout| @ 1 kHz (Ω, Norton I_ac=1 A pk)"
            group: ac_impedance
            abs_value: true
            max: 1.0
          - id: z_out_10k
            title: "|Zout| @ 10 kHz (Ω, Norton I_ac=1 A pk)"
            group: ac_impedance
            abs_value: true
            max: 1.0
          - id: z_out_100k
            title: "|Zout| @ 100 kHz (Ω, Norton I_ac=1 A pk)"
            group: ac_impedance
            abs_value: true
            max: 1.0

  - netlist_rel: sim/ac_z_in.cir
    scenarios:
      - id: ac_z_in
        measures:
          - id: z_in_1k
            title: "|Zin| @ 1 kHz (Ω, Norton I_ac=1 µA pk → ×1e6)"
            group: ac_impedance
            abs_value: true
            scale: 1e6
            max: 100.0
          - id: z_in_10k
            title: "|Zin| @ 10 kHz (Ω, Norton I_ac=1 µA pk → ×1e6)"
            group: ac_impedance
            abs_value: true
            scale: 1e6
            max: 100.0
          - id: z_in_100k
            title: "|Zin| @ 100 kHz (Ω, Norton I_ac=1 µA pk → ×1e6)"
            group: ac_impedance
            abs_value: true
            scale: 1e6
            max: 100.0

plots:
  - file: tran-vout.png
    signal: v(/vout_+3.3v)
