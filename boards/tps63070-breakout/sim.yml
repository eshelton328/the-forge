# Opt-in SPICE for this board (mirrors checks.yml pattern). Requires sim/overlay.cir.
# Transient scenarios: #76. Small-signal AC: secondary deck sim/ac_small_signal.cir (#79).
spec_version: 1
spice_engine: ngspice

assembly:
  main: sim/kicad_export.cir
  includes:
    - ../../libs/spice/tps63070/TPS63070_TRANS.LIB

scenarios:
  - id: vin_bias_op
    measures:
      - id: v_vin
        op_node: "/VIN_2v_to_16v"
        min: 9.99
        max: 10.01
  - id: tran_settle
    measures:
      - id: v_out_steady
        min: 3.28
        max: 3.32
      - id: v_out_min
        min: 3.25
      - id: vout_ripple_pp
        max: 0.15
  - id: tran_load_step
    measures:
      - id: v_out_light_load
        min: 3.25
        max: 3.35
      - id: v_out_heavy_load
        min: 3.28
        max: 3.32

secondary_passes:
  - netlist_rel: sim/ac_small_signal.cir
    scenarios:
      - id: ac_small_signal
        measures:
          - id: vout_ac_vm
            max: 1.0

plots:
  - file: tran-vout.png
    signal: v(/vout_+3.3v)
