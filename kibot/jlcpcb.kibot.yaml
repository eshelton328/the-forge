kibot:
  version: 1

outputs:
  - name: jlcpcb_gerbers
    comment: "Gerbers compatible with JLCPCB"
    type: gerber
    dir: output/jlcpcb
    options:
      exclude_edge_layer: true
      exclude_pads_from_silkscreen: true
      plot_sheet_reference: false
      plot_footprint_refs: true
      plot_footprint_values: false
      force_plot_invisible_refs_vals: false
      tent_vias: true
      use_protel_extensions: true
      create_gerber_job_file: false
      disable_aperture_macros: true
      gerber_precision: 4.6
      use_gerber_x2_attributes: false
      use_gerber_net_attributes: false
      line_width: 0.1
      subtract_mask_from_silk: true
      inner_extension_pattern: '.gp%n'
    layers:
      - F.Cu
      - B.Cu
      - In1.Cu
      - In2.Cu
      - F.SilkS
      - B.SilkS
      - F.Mask
      - B.Mask
      - Edge.Cuts

  - name: jlcpcb_drill
    comment: "Drill files compatible with JLCPCB"
    type: excellon
    dir: output/jlcpcb
    options:
      pth_and_npth_single_file: false
      pth_id: '-PTH'
      npth_id: '-NPTH'
      metric_units: true
      map: gerber
      route_mode_for_oval_holes: false
      output: "%f%i.%x"

  - name: jlcpcb_bom
    comment: "BOM for JLCPCB/LCSC"
    type: bom
    dir: output/jlcpcb
    options:
      output: '%f_bom_jlc.%x'
      ref_separator: ','
      columns:
        - field: Value
          name: Comment
        - field: References
          name: Designator
        - Footprint
        - field: 'LCSC#'
          name: 'LCSC Part #'
      csv:
        hide_pcb_info: true
        hide_stats_info: true
        quote_all: true

  - name: jlcpcb_position
    comment: "Pick and place file for JLCPCB"
    type: position
    dir: output/jlcpcb
    options:
      output: '%f_cpl_jlc.%x'
      format: CSV
      units: millimeters
      separate_files_for_front_and_back: false
      only_smd: true
      columns:
        - id: Ref
          name: Designator
        - Val
        - Package
        - id: PosX
          name: "Mid X"
        - id: PosY
          name: "Mid Y"
        - id: Rot
          name: Rotation
        - id: Side
          name: Layer

  - name: jlcpcb_zip
    comment: "ZIP file ready to upload to JLCPCB"
    type: compress
    dir: output
    options:
      output: '%f_jlcpcb.%x'
      files:
        - from_output: jlcpcb_gerbers
          dest: /
        - from_output: jlcpcb_drill
          dest: /

groups:
  - name: jlcpcb
    outputs:
      - jlcpcb_gerbers
      - jlcpcb_drill
      - jlcpcb_bom
      - jlcpcb_position
      - jlcpcb_zip
